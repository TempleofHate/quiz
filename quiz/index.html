<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedQuiz: Histologia</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <header>
            <h1>MedQuiz: Histologia</h1>
            <button id="theme-toggle" title="Alternar Tema">☀️ Claro</button>
        </header>

        <main class="card" id="main-card">
            
            <section id="start-screen" class="screen active">
                <h2>Simulado de Histologia e Embriologia</h2>
                <p>Escolha a modalidade do seu treinamento. Todas as questões possuem limite de 1 minuto.</p>
                
                <div class="mode-selection">
                    <button class="btn-mode" data-mode="text">
                        <span class="mode-icon">📝</span>
                        <div class="mode-text">
                            <strong>Prova Teórica</strong>
                            <span>30 Questões de Texto</span>
                        </div>
                    </button>
                    
                    <button class="btn-mode" data-mode="image">
                        <span class="mode-icon">🖼️</span>
                        <div class="mode-text">
                            <strong>Quiz de Lâminas</strong>
                            <span>75 Questões de Imagem</span>
                        </div>
                    </button>

                    <button class="btn-mode" data-mode="pdf">
                        <span class="mode-icon">📚</span>
                        <div class="mode-text">
                            <strong>Quiz dos PDFs (Monitoria UFC)</strong>
                            <span>42 Questões de Prova</span>
                        </div>
                    </button>
                    
                    <button class="btn-mode mode-all" data-mode="all">
                        <span class="mode-icon">🔥</span>
                        <div class="mode-text">
                            <strong>Modo Completo</strong>
                            <span>Todas as 147 Questões</span>
                        </div>
                    </button>
                </div>
            </section>

            <section id="question-screen" class="screen">
                <div class="status-bar">
                    <span id="question-counter">Questão 1</span>
                    <div id="timer-display" class="timer">⏱ 60s</div>
                </div>
                
                <div class="progress-container">
                    <div id="progress-bar" class="progress-fill"></div>
                </div>

                <div class="image-container hidden" id="image-container">
                    <img id="question-image" src="" alt="Lâmina Histológica">
                </div>

                <h3 id="question-text">Texto da Pergunta</h3>
                
                <div id="options-container" class="options-grid">
                    </div>

                <div id="feedback-container" class="feedback hidden">
                    <p id="feedback-title" class="feedback-title"></p>
                    <p id="feedback-explanation"></p>
                </div>

                <div class="action-footer">
                    <button id="btn-next" class="btn-primary hidden">Próxima Questão ➔</button>
                </div>
            </section>

            <section id="result-screen" class="screen">
                <h2>Simulado Concluído!</h2>
                <p>Confira seu desempenho acadêmico.</p>
                
                <div class="score-circle">
                    <span id="score-text" class="score-number">0</span>
                    <span id="score-total-text" class="score-total">de 147</span>
                </div>

                <p id="performance-text" class="performance"></p>

                <button id="btn-restart" class="btn-outline">🔄 Voltar ao Menu</button>
            </section>

        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
